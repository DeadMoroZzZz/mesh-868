<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Secure Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --accent: #00e676; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: var(--card); padding: 2rem; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        #chat-window { height: 300px; overflow-y: auto; background: #121212; border-radius: 8px; padding: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: red; margin-right: 5px; }
        .connected { background: var(--accent); }
    </style>
</head>
<body>

<div class="app-container" id="login-screen">
    <h2 style="text-align:center">Mesh 868 Access</h2>
    <p style="font-size: 0.9em; color: #888;">Введите ваш персональный ключ ноды</p>
    <input type="text" id="pass-key" placeholder="Пример: A4B7D2C9" maxlength="8">
    <button onclick="authenticate()">Авторизоваться</button>
</div>

<div class="app-container hidden" id="main-app">
    <div style="margin-bottom: 15px;">
        <span id="status-dot" class="status-dot"></span>
        <small id="status-text">Нода не найдена</small>
    </div>
    <div id="chat-window"></div>
    <input type="text" id="msg-input" placeholder="Введите сообщение...">
    <button id="ble-btn" onclick="initBle()">Подключить Bluetooth</button>
    <button id="send-btn" class="hidden" onclick="sendMsg()">Отправить в эфир</button>
</div>

<script>
    // Массив из 100 паролей (сокращено для примера)
    const VAULT = ["A4B7D2C9", "7D8E9F0A", "1B2C3D4E", "F5A6B7C8"]; // Сюда вставить все 100

    function authenticate() {
        const input = document.getElementById('pass-key').value.toUpperCase();
        if (VAULT.includes(input)) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        } else {
            alert("Ключ не валиден!");
        }
    }

    let bleDevice, bleCharacteristic;

    async function initBle() {
        try {
            // Стандартный UUID сервиса Meshtastic
            const SERVICE_UUID = "cb0b9a0b-184a-46a6-bc0d-20591b9e0441";
            const CHAR_UUID    = "2566085a-035b-4375-9c59-d890041235b2";

            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Meshtastic' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(CHAR_UUID);

            document.getElementById('status-dot').classList.add('connected');
            document.getElementById('status-text').innerText = "Подключено: " + bleDevice.name;
            document.getElementById('ble-btn').classList.add('hidden');
            document.getElementById('send-btn').classList.remove('hidden');
            
            logToChat("Система: Связь с нодой установлена.");
        } catch (e) {
            alert("Ошибка BLE: " + e.message);
        }
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if (!input.value) return;

        // В Meshtastic сообщение должно быть упаковано в Protobuf
        // Для примера отправляем сырой текст (в реальности нужен TextEncoder)
        let encoder = new TextEncoder();
        let data = encoder.encode(input.value);
        
        bleCharacteristic.writeValue(data); 
        logToChat("Вы: " + input.value);
        input.value = "";
    }

    function logToChat(txt) {
        const win = document.getElementById('chat-window');
        win.innerHTML += `<div><small>[${new Date().toLocaleTimeString()}]</small> ${txt}</div>`;
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
