<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh 868 Secure Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>
    
    <style>
        :root { --bg: #0b0e14; --accent: #00e676; --text: #e0e0e0; --error: #ff5252; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; justify-content: center; }
        .terminal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 100%; max-width: 450px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h2 { color: var(--accent); margin: 0 0 20px 0; font-weight: 400; text-transform: uppercase; text-align: center; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; width: calc(100% - 26px); margin-bottom: 15px; border-radius: 6px; font-size: 16px; }
        button { background: var(--accent); color: #000; border: none; padding: 14px; width: 100%; cursor: pointer; font-weight: 700; border-radius: 6px; text-transform: uppercase; }
        #console { background: #000; height: 180px; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 11px; overflow-y: auto; margin-bottom: 15px; color: #8b949e; border: 1px solid #30363d; line-height: 1.4; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-box" class="terminal">
        <h2>Mesh Access</h2>
        <input type="text" id="node-id" placeholder="ID Ноды (напр. !59cf6014)">
        <input type="password" id="pass-key" placeholder="Ликвидный пароль">
        <button onclick="validateAndLoad()">Войти в систему</button>
    </div>

    <div id="main-app" class="terminal hidden">
        <h2>Mesh 868 Secure</h2>
        <div id="console">Готов к поиску устройств...</div>
        
        <button id="connect-bt">Связаться с нодой (BLE)</button>
        
        <div style="margin-top: 20px;">
            <input type="text" id="msg-input" placeholder="Введите сообщение...">
            <button onclick="sendMeshMessage()" style="background: #2196f3; color: white;">Отправить пакет</button>
        </div>
    </div>

    <script type="text/plain" id="proto-data">
        syntax = "proto3";
        package meshtastic;
        message ToRadio { oneof payload_variant { MeshPacket packet = 1; } }
        message MeshPacket { uint32 to = 1; uint32 from = 2; Data decoded = 3; uint32 id = 4; bool want_ack = 5; }
        message Data { string portnum = 1; bytes payload = 2; }
    </script>

    <script>
        const MASTER_SECRET = "PROJECT_MESH_2026"; 
        const MESH_SERVICE_UUID = 'cb0e203c-c349-44e3-b06d-741a455a1a1a';
        const MESH_CHAR_UUID = '8ba2dfa0-4a4e-4d44-9355-66191007bc43';

        let root, ToRadio, bluetoothChar;

        function validateAndLoad() {
            const id = document.getElementById('node-id').value.trim().toLowerCase();
            const pass = document.getElementById('pass-key').value;
            const validPass = CryptoJS.HmacSHA256(id, MASTER_SECRET).toString().substring(0, 8);

            if (pass === validPass) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initProtobuf();
            } else {
                alert("Ошибка: Пароль не ликвиден!");
            }
        }

        function initProtobuf() {
            const protoContent = document.getElementById('proto-data').textContent;
            root = protobuf.parse(protoContent).root;
            ToRadio = root.lookupType("meshtastic.ToRadio");
        }

        // РАБОЧИЙ ПОИСК ИЗ ВАШЕГО ПРИМЕРА
        document.getElementById('connect-bt').onclick = async () => {
            printLog("Запуск всеядного поиска...");
            try {
                // Используем acceptAllDevices чтобы увидеть ноду без фильтров
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [MESH_SERVICE_UUID] 
                });

                printLog(`Подключение к: ${device.name || 'Device'}...`);
                const server = await device.gatt.connect();
                
                printLog("GATT подключен. Поиск сервиса Meshtastic...");
                const service = await server.getPrimaryService(MESH_SERVICE_UUID);
                
                printLog("Сервис найден. Открываю канал...");
                bluetoothChar = await service.getCharacteristic(MESH_CHAR_UUID);
                
                printLog("СВЯЗЬ УСТАНОВЛЕНА!", "var(--accent)");
                document.getElementById('connect-bt').innerText = "ПОДКЛЮЧЕНО: " + (device.name || "Node");
                document.getElementById('connect-bt').style.background = "#333";

            } catch (e) {
                printLog("ОШИБКА: " + e.message, "var(--error)");
                console.error(e);
            }
        };

        async function sendMeshMessage() {
            const text = document.getElementById('msg-input').value;
            if (!bluetoothChar || !text) return alert("Нет связи с нодой!");

            try {
                const payload = {
                    packet: {
                        decoded: { portnum: "TEXT_MESSAGE_APP", payload: new TextEncoder().encode(text) },
                        to: 0xFFFFFFFF,
                        wantAck: true
                    }
                };
                const buffer = ToRadio.encode(ToRadio.create(payload)).finish();
                await bluetoothChar.writeValue(buffer);
                printLog(`ОТПРАВЛЕНО: ${text}`, "white");
                document.getElementById('msg-input').value = "";
            } catch (e) {
                printLog("Ошибка передачи: " + e.message, "var(--error)");
            }
        }

        function printLog(txt, color = "") {
            const log = document.getElementById('console');
            const entry = document.createElement('div');
            if (color) entry.style.color = color;
            entry.innerText = `> ${txt}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
