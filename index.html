<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meshtastic Web Connect</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .hidden { display: none; }

        button {
            background-color: #00e676;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #00c853; }

        #chat-window {
            flex-direction: column;
            height: 300px;
        }

        #messages {
            flex-grow: 1;
            background: #2d2d2d;
            border-radius: 6px;
            padding: 10px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input {
            flex-grow: 1;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
        }

        .status {
            font-size: 12px;
            margin-bottom: 15px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Meshtastic Web</h2>
    
    <div id="search-page">
        <p>Подключите вашу ноду по Bluetooth</p>
        <button id="connect-btn">Поиск ноды</button>
    </div>

    <div id="chat-page" class="hidden">
        <div class="status" id="status-text">Подключено к: <span id="device-name">...</span></div>
        <div id="messages"></div>
        <div class="input-group">
            <input type="text" id="message-input" placeholder="Введите сообщение...">
            <button id="send-btn">✉</button>
        </div>
    </div>
</div>

<script>
    let bluetoothDevice;
    let characteristic;

    // UUID для Meshtastic (стандартные для сервиса данных)
    const MESHTASTIC_SERVICE_UUID = "8ba2df10-bc54-433e-a744-12492f153966";
    const MESHTASTIC_CHAR_UUID = "8ba2df11-bc54-433e-a744-12492f153966";

    const connectBtn = document.getElementById('connect-btn');
    const searchPage = document.getElementById('search-page');
    const chatPage = document.getElementById('chat-page');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesDiv = document.getElementById('messages');
    const deviceNameSpan = document.getElementById('device-name');

    connectBtn.addEventListener('click', async () => {
        try {
            // Запрос устройства
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Meshtastic' }, { namePrefix: 'Mesh' }],
                optionalServices: [MESHTASTIC_SERVICE_UUID]
            });

            const server = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService(MESHTASTIC_SERVICE_UUID);
            characteristic = await service.getCharacteristic(MESHTASTIC_CHAR_UUID);

            // Настройка уведомлений (прием сообщений)
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', handleNotifications);

            // Переключение интерфейса
            deviceNameSpan.textContent = bluetoothDevice.name;
            searchPage.classList.add('hidden');
            chatPage.classList.remove('hidden');
            chatPage.style.display = 'flex';

            addMessage("Система", "Успешно подключено!");

        } catch (error) {
            console.error("Ошибка подключения:", error);
            alert("Не удалось подключиться: " + error.message);
        }
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
        const text = messageInput.value;
        if (!text || !characteristic) return;

        try {
            // В Meshtastic используется Protobuf, но для простого текста 
            // в базовом варианте можно передать массив байтов.
            const encoder = new TextEncoder();
            await characteristic.writeValue(encoder.encode(text));
            
            addMessage("Вы", text);
            messageInput.value = '';
        } catch (error) {
            addMessage("Ошибка", "Не удалось отправить");
        }
    }

    function handleNotifications(event) {
        const value = event.target.value;
        const decoder = new TextDecoder();
        const text = decoder.decode(value);
        addMessage("Нода", text);
    }

    function addMessage(sender, text) {
        const msgEl = document.createElement('div');
        msgEl.innerHTML = `<strong>${sender}:</strong> ${text}`;
        messagesDiv.appendChild(msgEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
</script>

</body>
</html>
